<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOAN AI Portal</title>
<style>
    /* Body & background */
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #0f0f0f;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* RGB animated title */
    h1 {
        font-size: 3em;
        font-weight: bold;
        text-align: center;
        margin: 30px 0 20px 0;
        background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: hue 5s linear infinite;
    }

    @keyframes hue {
        0% { filter: hue-rotate(0deg);}
        100% { filter: hue-rotate(360deg);}
    }

    /* Search bar */
    #search-container {
        width: 90%;
        max-width: 600px;
        display: flex;
        margin-bottom: 20px;
    }

    #search-bar {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px 0 0 5px;
        font-size: 1em;
    }

    #search-button {
        padding: 10px 15px;
        border: none;
        background: #ff00ff;
        color: #fff;
        font-weight: bold;
        border-radius: 0 5px 5px 0;
        cursor: pointer;
        transition: 0.3s;
    }

    #search-button:hover {
        background: #00ffff;
    }

    /* Shortcut cards */
    .shortcuts {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
        gap: 15px;
    }

    .shortcut {
        background: #1a1a1a;
        border: 1px solid #444;
        padding: 15px 25px;
        border-radius: 10px;
        text-decoration: none;
        color: #fff;
        font-weight: bold;
        transition: 0.3s;
    }

    .shortcut:hover {
        background: #ff00ff;
        color: #fff;
        transform: scale(1.05);
    }

    /* AI Chat area */
    #ai-container {
        width: 90%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 30px;
    }

    #chat-box {
        width: 100%;
        height: 150px;
        background: #1a1a1a;
        color: #fff;
        border: 1px solid #444;
        border-radius: 5px;
        padding: 10px;
        resize: none;
    }

    #chat-input {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: none;
        font-size: 1em;
    }

    #buttons {
        display: flex;
        gap: 10px;
    }

    .ai-btn {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .ai-btn:hover {
        transform: scale(1.05);
    }

    #ask-ai { background: #ff00ff; color: #fff; }
    #summarize-ai { background: #00ffff; color: #000; }
</style>
</head>
<body>

<h1>JOAN AI</h1>

<!-- Search -->
<div id="search-container">
    <input id="search-bar" type="text" placeholder="Search the web...">
    <button id="search-button">Go</button>
</div>

<!-- Shortcuts -->
<div class="shortcuts">
    <a href="https://www.google.com" target="_blank" class="shortcut">Google</a>
    <a href="https://www.youtube.com" target="_blank" class="shortcut">YouTube</a>
    <a href="https://www.github.com" target="_blank" class="shortcut">GitHub</a>
    <a href="https://www.reddit.com" target="_blank" class="shortcut">Reddit</a>
</div>

<!-- AI Chat -->
<div id="ai-container">
    <textarea id="chat-box" readonly placeholder="AI Chat / Summarize output will appear here..."></textarea>
    <input id="chat-input" type="text" placeholder="Ask AI anything...">
    <div id="buttons">
        <button id="ask-ai" class="ai-btn">Ask AI</button>
        <button id="summarize-ai" class="ai-btn">AI Summarize</button>
    </div>
</div>

<script>
    // Search functionality
    document.getElementById('search-button').addEventListener('click', () => {
        const query = document.getElementById('search-bar').value;
        if(query) {
            window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
        }
    });

    // Press Enter to search
    document.getElementById('search-bar').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') document.getElementById('search-button').click();
    });

    // AI Buttons (placeholder)
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');

    document.getElementById('ask-ai').addEventListener('click', () => {
        if(chatInput.value.trim() !== "") {
            chatBox.value += "You: " + chatInput.value + "\nAI: [AI response here]\n\n";
            chatInput.value = "";
        }
    });

    document.getElementById('summarize-ai').addEventListener('click', () => {
        chatBox.value += "[Page summary would appear here]\n\n";
    });

    // Press Enter in AI input to ask AI
    chatInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            e.preventDefault(); // prevent new line
            document.getElementById('ask-ai').click();
        }
    });
</script>

</body>
</html>
